name: Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.PROD_PATH }}"

            echo "Fetching latest code on master..."
            git fetch origin master
            git reset --hard origin/master

            echo "Installing PHP dependencies..."
            composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

            echo "Running Craft updates..."
            php craft up --interactive=0

            echo "Syncing project configuration..."
            php craft project-config/sync --interactive=0

            echo "Temporarily enabling admin changes..."
            export CRAFT_ALLOW_ADMIN_CHANGES=true

            echo "Creating site header content..."
            php scripts/create_site_header.php

            echo "Creating home page content..."
            php scripts/create_home_content.php

            echo "Clearing compiled templates and caches..."
            php craft clear-caches/all --interactive=0 || true

            echo "Deploy completed."
